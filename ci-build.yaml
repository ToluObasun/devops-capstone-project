name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: accounts
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Ensure postgres is healthy before running the steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    container:
      image: python:3.9-slim

    env:
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/accounts
      FLASK_ENV: testing

    steps:
      # 1. Component: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Dependency Setup
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3. Component: Lint the code after checkout
      - name: Lint with Flake8
        run: |
          flake8 service --count --select=E9,F63,F7,F82 --show-source --statistics

      # 4. Component: Execute unit tests using nosetests after linting
      - name: Run Unit Tests with Nosetests
        run: |
          nosetests
