[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service
cover-html=1
cover-html-dir=coverage_html

[flake8]
# Enforce PEP 8 styles while ignoring minor formatting conflicts
ignore = E501, W503
select = E9,F63,F7,F82
exclude = .git,__pycache__,venv,env
max-line-length = 127
count = True
statistics = True
show-source = True

[pylint]
# Configure basic parameters for structural static analysis
max-line-length=127
disable=C0114,C0115,C0116,R0903
ignore=venv,env,.git

[pylint.REPORTS]
output-format=colorized
reports=no
